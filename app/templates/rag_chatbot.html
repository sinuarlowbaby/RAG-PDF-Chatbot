<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RAG Chatbot</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    height: 100vh; display: flex; flex-direction: column;
    background: linear-gradient(135deg, #f0f4ff 0%, #faf5ff 50%, #f0fdf4 100%);
    color: #1e1b4b; overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #06b6d4 100%);
    padding: 0 24px; height: 62px; display: flex; align-items: center;
    justify-content: space-between; flex-shrink: 0;
    box-shadow: 0 4px 24px rgba(99,102,241,.35);
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .bot-avatar {
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(255,255,255,.25); display: flex;
    align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  .bot-avatar svg { stroke: #fff; }
  .app-title { color: #fff; font-weight: 700; font-size: 17px; letter-spacing: -.3px; }
  .app-sub   { color: rgba(255,255,255,.7); font-size: 11px; }

  .settings-bar { display: flex; align-items: center; gap: 20px; }
  .setting-group { display: flex; align-items: center; gap: 8px; }
  .setting-label { color: rgba(255,255,255,.85); font-size: 12px; font-weight: 500; white-space: nowrap; }
  .temp-val {
    background: rgba(255,255,255,.2); color: #fff;
    font-size: 11px; font-weight: 700; border-radius: 6px; padding: 2px 7px;
  }
  input[type=range] { width: 80px; accent-color: #fbbf24; cursor: pointer; }
  .divider { width: 1px; height: 28px; background: rgba(255,255,255,.25); }

  /* Toggle */
  .toggle-wrap { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .toggle {
    width: 38px; height: 21px; border-radius: 11px;
    background: rgba(255,255,255,.3); position: relative;
    transition: background .25s; cursor: pointer; flex-shrink: 0;
  }
  .toggle.on { background: #4ade80; }
  .toggle-knob {
    position: absolute; top: 2px; left: 2px;
    width: 17px; height: 17px; border-radius: 50%;
    background: #fff; transition: left .25s;
    box-shadow: 0 1px 4px rgba(0,0,0,.2);
  }
  .toggle.on .toggle-knob { left: 19px; }

  /* ── BODY ── */
  .body { flex: 1; display: flex; overflow: hidden; padding: 16px; gap: 14px; }

  /* ── LEFT PANEL ── */
  .left-panel {
    width: 220px; flex-shrink: 0;
    background: #fff; border-radius: 20px; padding: 18px;
    box-shadow: 0 4px 24px rgba(99,102,241,.10);
    border: 1px solid rgba(99,102,241,.12);
    display: flex; flex-direction: column; gap: 14px;
  }
  .panel-title {
    font-weight: 700; font-size: 12px; color: #6366f1;
    letter-spacing: .5px; text-transform: uppercase;
  }
  .upload-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff; border: none; border-radius: 12px;
    padding: 10px 12px; font-weight: 600; font-size: 13px;
    cursor: pointer; box-shadow: 0 4px 14px rgba(99,102,241,.4);
    transition: transform .15s, box-shadow .15s; font-family: inherit;
  }
  .upload-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(99,102,241,.5); }

  .file-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .file-item {
    display: flex; align-items: center; gap: 7px;
    background: linear-gradient(135deg, #eef2ff, #f5f3ff);
    border-radius: 10px; padding: 8px 10px;
    border: 1px solid rgba(99,102,241,.15);
    font-size: 12px; color: #4338ca; font-weight: 500;
  }
  .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-del {
    background: none; border: none; cursor: pointer;
    color: #f87171; display: flex; padding: 0; flex-shrink: 0;
  }
  .file-del:hover { color: #ef4444; }
  .no-files { color: #a0aec0; font-size: 12px; text-align: center; margin-top: 20px; }

  .clear-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    background: linear-gradient(135deg, #fff1f2, #fce7f3);
    color: #f43f5e; border: 1px solid rgba(244,63,94,.2);
    border-radius: 10px; padding: 8px 12px; font-weight: 600;
    font-size: 12px; cursor: pointer; transition: transform .15s;
    font-family: inherit;
  }
  .clear-btn:hover { transform: translateY(-1px); }

  /* ── MAIN CHAT ── */
  .chat-panel {
    flex: 1; display: flex; flex-direction: column;
    background: #fff; border-radius: 20px;
    box-shadow: 0 4px 24px rgba(99,102,241,.10);
    border: 1px solid rgba(99,102,241,.12); overflow: hidden;
  }
  .messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .msg-row { display: flex; align-items: flex-end; gap: 8px; }
  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    color: #fff; box-shadow: 0 2px 8px rgba(99,102,241,.3);
  }
  .avatar svg { stroke: #fff; }

  .bubble-wrap { max-width: 70%; }
  .bubble {
    border-radius: 18px 18px 18px 4px;
    padding: 12px 16px; font-size: 14px; line-height: 1.55;
    background: linear-gradient(135deg, #f8faff, #f5f3ff);
    color: #1e1b4b;
    box-shadow: 0 2px 12px rgba(0,0,0,.06);
    border: 1px solid rgba(99,102,241,.12);
  }
  .bubble.user {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff; border-radius: 18px 18px 4px 18px; border: none;
    box-shadow: 0 4px 16px rgba(99,102,241,.3);
  }
  .msg-time { font-size: 10px; color: #a0aec0; margin-top: 4px; padding-inline: 4px; }
  .msg-row.user .msg-time { text-align: right; }

  /* Typing dots */
  .typing { display: flex; gap: 5px; align-items: center; padding: 12px 16px; }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #8b5cf6; opacity: .7;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: .2s; }
  .dot:nth-child(3) { animation-delay: .4s; }

  /* Input bar */
  .input-bar {
    padding: 14px 20px; border-top: 1px solid rgba(99,102,241,.1);
    background: #fafbff; display: flex; gap: 10px; align-items: center;
  }
  .chat-input {
    flex: 1; border: 1.5px solid rgba(99,102,241,.2); border-radius: 14px;
    padding: 12px 16px; font-size: 14px; outline: none;
    background: #fff; color: #1e1b4b; font-family: inherit;
    transition: border-color .2s;
  }
  .chat-input:focus { border-color: #6366f1; }
  .send-btn {
    width: 46px; height: 46px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff; display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(99,102,241,.4);
    transition: transform .15s, box-shadow .15s;
  }
  .send-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(99,102,241,.5); }
  .send-btn svg { stroke: #fff; }

  /* ── RIGHT PANEL ── */
  .right-panel {
    width: 265px; flex-shrink: 0;
    background: #fff; border-radius: 20px;
    box-shadow: 0 4px 24px rgba(99,102,241,.10);
    border: 1px solid rgba(99,102,241,.12);
    display: flex; flex-direction: column; overflow: hidden;
    transition: width .3s ease, opacity .3s ease;
  }
  .right-panel.hidden { width: 0; opacity: 0; pointer-events: none; padding: 0; overflow: hidden; }

  .ctx-header {
    padding: 14px 18px; border-bottom: 1px solid rgba(99,102,241,.1);
    background: linear-gradient(135deg, #eef2ff, #f5f3ff); flex-shrink: 0;
  }
  .ctx-title { font-weight: 700; font-size: 12px; color: #6366f1; letter-spacing: .5px; text-transform: uppercase; }
  .ctx-sub { font-size: 11px; color: #a0aec0; margin-top: 3px; }

  .chunks { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .empty-ctx { text-align: center; padding: 40px 20px; color: #cbd5e0; }
  .empty-ctx .empty-icon { font-size: 32px; margin-bottom: 10px; }
  .empty-ctx p { font-size: 13px; }

  .chunk-card {
    background: linear-gradient(135deg, #fafbff, #f5f3ff);
    border: 1px solid rgba(99,102,241,.15);
    border-radius: 14px; padding: 12px 14px;
    animation: fadeUp .4s ease;
  }
  .chunk-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .chunk-src { display: flex; align-items: center; gap: 5px; color: #8b5cf6; font-size: 11px; font-weight: 600; }
  .chunk-score { font-size: 11px; font-weight: 700; border-radius: 8px; padding: 2px 8px; }
  .chunk-text { font-size: 12px; color: #4a5568; line-height: 1.6; }
  .score-bar-bg { margin-top: 10px; height: 4px; border-radius: 4px; background: #e9ecef; overflow: hidden; }
  .score-bar-fill { height: 100%; border-radius: 4px; transition: width .8s ease; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(99,102,241,.25); border-radius: 4px; }

  /* Animations */
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30%            { transform: translateY(-6px); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fadeUp { animation: fadeUp .35s ease; }
</style>
</head>
<body>

<!-- ══════════ HEADER ══════════ -->
<header>
  <div class="header-left">
    <div class="bot-avatar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2">
        <rect x="3" y="11" width="18" height="10" rx="2"/>
        <circle cx="12" cy="5" r="2"/>
        <path d="M12 7v4"/>
        <line x1="8" y1="16" x2="8" y2="16" stroke-linecap="round" stroke-width="3"/>
        <line x1="16" y1="16" x2="16" y2="16" stroke-linecap="round" stroke-width="3"/>
      </svg>
    </div>
    <div>
      <div class="app-title">RAG Chatbot</div>
      <div class="app-sub">Retrieval-Augmented Generation</div>
    </div>
  </div>

  <div class="settings-bar">
    <!-- Temperature -->
    <div class="setting-group">
      <span class="setting-label">🌡️ Temp</span>
      <input type="range" id="tempSlider" min="0" max="1" step="0.05" value="0.7" oninput="updateTemp(this.value)"/>
      <span class="temp-val" id="tempVal">0.70</span>
    </div>

    <div class="divider"></div>

    <!-- Reranker -->
    <div class="toggle-wrap" onclick="toggleReranker()">
      <div class="toggle on" id="rerankerToggle"><div class="toggle-knob"></div></div>
      <span class="setting-label">Reranker</span>
    </div>

    <!-- Context -->
    <div class="toggle-wrap" onclick="toggleContext()">
      <div class="toggle on" id="contextToggle"><div class="toggle-knob"></div></div>
      <span class="setting-label">Context</span>
    </div>
  </div>
</header>

<!-- ══════════ BODY ══════════ -->
<div class="body">

  <!-- LEFT PANEL -->
  <aside class="left-panel">
    <div class="panel-title">📁 Documents</div>

    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Upload PDF
    </button>
    <input type="file" id="fileInput" accept=".pdf" multiple hidden onchange="handleUpload(this)"/>

    <div class="file-list" id="fileList">
      <!-- populated by JS -->
    </div>

    <button class="clear-btn" onclick="clearFiles()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/>
        <path d="M10,11v6"/><path d="M14,11v6"/><path d="M9,6V4h6v2"/>
      </svg>
      Clear Documents
    </button>
  </aside>

  <!-- MAIN CHAT -->
  <main class="chat-panel">
    <div class="messages" id="messages">
      <!-- populated by JS -->
    </div>
    <div class="input-bar">
      <input class="chat-input" id="chatInput" type="text"
        placeholder="Ask a question about your documents…"
        onkeydown="if(event.key==='Enter') sendMessage()"/>
      <button class="send-btn" onclick="sendMessage()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22,2 15,22 11,13 2,9"/>
        </svg>
      </button>
    </div>
  </main>

  <!-- RIGHT PANEL -->
  <aside class="right-panel" id="rightPanel">
    <div class="ctx-header">
      <div class="ctx-title">🔍 Retrieved Context</div>
      <div class="ctx-sub" id="ctxSub">Reranker active · 0 chunks</div>
    </div>
    <div class="chunks" id="chunks">
      <div class="empty-ctx">
        <div class="empty-icon">📭</div>
        <p>Ask a question to see retrieved chunks here</p>
      </div>
    </div>
  </aside>

</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let files    = ['research_paper.pdf', 'architecture.pdf'];
let reranker = true;
let showCtx  = true;
let msgCount = 0;

const MOCK_CHUNKS = [
  { id:1, text:"RAG combines retrieval systems with generative models to produce grounded, accurate answers based on provided documents.", score:0.97, source:"intro.pdf" },
  { id:2, text:"The vector store indexes document embeddings for fast semantic search. Top-k chunks are fetched and passed to the LLM as context.", score:0.91, source:"architecture.pdf" },
  { id:3, text:"Reranking re-scores retrieved chunks using a cross-encoder, improving precision by prioritizing the most relevant passages before generation.", score:0.84, source:"reranking.pdf" },
];

const MOCK_RESP = [
  "Based on the retrieved context, RAG systems work by combining semantic retrieval with generative models to produce accurate, grounded answers. 🔍",
  "The documents indicate that vector stores enable fast similarity search over embedded chunks, fed to the LM as context. 📚",
  "According to the indexed content, reranking significantly improves answer quality by re-scoring passages using cross-encoder models. ⚡",
  "The retrieved chunks suggest that temperature controls creativity — lower values produce more deterministic, factual responses. 🌡️",
];

// ── Init ───────────────────────────────────────────────────────────────────
window.onload = () => {
  renderFiles();
  appendMessage('bot', "Hello! Upload your documents and ask me anything. I'll retrieve relevant context to answer your questions accurately. 🤖");
};

// ── Helpers ────────────────────────────────────────────────────────────────
function now() {
  return new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}

function scoreColor(s) {
  if (s >= .9) return '#10b981';
  if (s >= .8) return '#f59e0b';
  return '#f87171';
}

// ── Files ──────────────────────────────────────────────────────────────────
function handleUpload(input) {
  Array.from(input.files).forEach(f => {
    if (!files.includes(f.name)) files.push(f.name);
  });
  input.value = '';
  renderFiles();
}

function clearFiles() { files = []; renderFiles(); }

function deleteFile(idx) { files.splice(idx, 1); renderFiles(); }

function renderFiles() {
  const el = document.getElementById('fileList');
  if (!files.length) {
    el.innerHTML = '<div class="no-files">No documents yet</div>';
    return;
  }
  el.innerHTML = files.map((f, i) => `
    <div class="file-item">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14,2 14,8 20,8"/>
      </svg>
      <span class="file-name" title="${f}">${f}</span>
      <button class="file-del" onclick="deleteFile(${i})">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/>
          <path d="M10,11v6"/><path d="M14,11v6"/>
        </svg>
      </button>
    </div>`).join('');
}

// ── Chat ───────────────────────────────────────────────────────────────────
function appendMessage(role, text) {
  const msgs = document.getElementById('messages');
  const isUser = role === 'user';

  const row = document.createElement('div');
  row.className = `msg-row fadeUp ${isUser ? 'user' : ''}`;

  const avatar = isUser ? '' : `
    <div class="avatar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke-width="2">
        <rect x="3" y="11" width="18" height="10" rx="2"/>
        <circle cx="12" cy="5" r="2"/>
        <path d="M12 7v4"/>
      </svg>
    </div>`;

  row.innerHTML = `
    ${avatar}
    <div class="bubble-wrap">
      <div class="bubble ${isUser ? 'user' : ''}">${text}</div>
      <div class="msg-time">${now()}</div>
    </div>`;

  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row fadeUp';
  row.id = 'typingRow';
  row.innerHTML = `
    <div class="avatar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <rect x="3" y="11" width="18" height="10" rx="2"/>
        <circle cx="12" cy="5" r="2"/>
        <path d="M12 7v4"/>
      </svg>
    </div>
    <div class="bubble">
      <div class="typing">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
    </div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingRow');
  if (el) el.remove();
}

function sendMessage() {
  const input = document.getElementById('chatInput');
  const text  = input.value.trim();
  if (!text) return;

  appendMessage('user', text);
  input.value = '';
  showTyping();
  clearChunks();

  setTimeout(() => {
    removeTyping();
    renderChunks(MOCK_CHUNKS);
    const resp = MOCK_RESP[msgCount % MOCK_RESP.length];
    msgCount++;
    appendMessage('bot', resp);
  }, 1400);
}

// ── Chunks ─────────────────────────────────────────────────────────────────
function clearChunks() {
  document.getElementById('chunks').innerHTML = `
    <div class="empty-ctx">
      <div class="empty-icon">📭</div>
      <p>Ask a question to see retrieved chunks here</p>
    </div>`;
  document.getElementById('ctxSub').textContent =
    `${reranker ? '✨ Reranker active' : 'Direct retrieval'} · 0 chunks`;
}

function renderChunks(chunks) {
  const el = document.getElementById('chunks');
  el.innerHTML = chunks.map(c => {
    const col  = scoreColor(c.score);
    const pct  = Math.round(c.score * 100);
    return `
      <div class="chunk-card">
        <div class="chunk-top">
          <div class="chunk-src">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            ${c.source}
          </div>
          <span class="chunk-score" style="background:${col}22;color:${col}">${pct}%</span>
        </div>
        <p class="chunk-text">${c.text}</p>
        <div class="score-bar-bg">
          <div class="score-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${col},${col}88)"></div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('ctxSub').textContent =
    `${reranker ? '✨ Reranker active' : 'Direct retrieval'} · ${chunks.length} chunks`;
}

// ── Settings ───────────────────────────────────────────────────────────────
function updateTemp(val) {
  document.getElementById('tempVal').textContent = parseFloat(val).toFixed(2);
}

function toggleReranker() {
  reranker = !reranker;
  document.getElementById('rerankerToggle').classList.toggle('on', reranker);
}

function toggleContext() {
  showCtx = !showCtx;
  document.getElementById('contextToggle').classList.toggle('on', showCtx);
  document.getElementById('rightPanel').classList.toggle('hidden', !showCtx);
}
</script>
</body>
</html>
