services:
  # 1. Vector Database — Qdrant
  vector-db:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 2. Cache / Task Queue Store — Valkey (Redis-compatible)
  valkey:
    image: valkey/valkey:latest
    container_name: valkey_db
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # 3. Python RAG Application
  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      valkey:
        condition: service_healthy
      vector-db:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://valkey:6379
      - QDRANT_URL=http://vector-db:6333
    env_file:
      - .env
    restart: unless-stopped

volumes:
  valkey_data:
  qdrant_data: