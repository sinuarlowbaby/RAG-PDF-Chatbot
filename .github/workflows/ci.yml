name: Python CI

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv
        uv pip install --system -r requirements.txt
        uv pip install --system pytest pytest-cov pytest-asyncio httpx

    - name: Run unit tests
      run: |
        pytest tests/test_unit.py --cov=app --cov-report=xml

  integration-tests:
    runs-on: ubuntu-latest

    services:
      redis:
        image: valkey/valkey:latest
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant
        ports:
          - 6333:6333

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv
        uv pip install --system -r requirements.txt
        uv pip install --system pytest pytest-cov pytest-asyncio httpx

    - name: Run integration tests
      run: |
        pytest tests/test_integration.py --cov=app --cov-report=xml

