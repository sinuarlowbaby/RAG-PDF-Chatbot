name: Python CI

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # Optional: Spin up Redis & Qdrant if we ever decide to run actual integration tests,
      # but since they are fully mocked in tests/conftest.py, we don't strictly need them
      # for the current test suite. We will keep the setup simple and fast.
      redis:
        image: valkey/valkey:latest
        ports:
          - 6379:6379
      qdrant:
        image: qdrant/qdrant
        ports:
          - 6333:6333

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install uv
        uv pip install --system -r requirements.txt
        uv pip install --system pytest pytest-cov pytest-asyncio httpx

    - name: Run tests with pytest
      run: |
        pytest --cov=app --cov-report=xml

    - name: Upload coverage reports to Codecov (Optional)
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        fail_ci_if_error: false
